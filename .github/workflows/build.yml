name: Build KytyPS5

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install Vulkan SDK 1.4.335.0
        shell: powershell
        run: |
          Invoke-WebRequest "https://sdk.lunarg.com/sdk/download/1.4.335.0/windows/VulkanSDK-1.4.335.0-Installer.exe" -OutFile VulkanSDK.exe
          Start-Process .\VulkanSDK.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait

          echo "VULKAN_SDK=C:\VulkanSDK\1.4.335.0" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\1.4.335.0\Bin" >> $env:GITHUB_PATH

      - name: Refresh Environment
        shell: powershell
        run: |
          $env:PATH = "C:\VulkanSDK\1.4.335.0\Bin;$env:PATH"
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Verify Tools
        shell: cmd
        run: |
          git --version
          cmake --version
          ninja --version
          clang-cl --version
          echo Qt6_DIR=%Qt6_DIR%
          echo VULKAN_SDK=%VULKAN_SDK%
          where glslangValidator
          glslangValidator --version

      - name: Configure
        shell: cmd
        run: |
          cmake -S src -B _Build/windows ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%"

      - name: Build
        shell: cmd
        run: |
          cmake --build _Build/windows --parallel --target launcher

      - name: Install
        shell: cmd
        run: |
          cmake --install _Build/windows --prefix _Build/windows/install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5
          path: _Build/windows/install/**
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: KytyPS5
          path: KytyPS5

      - name: Zip
        run: zip -r KytyPS5.zip KytyPS5

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=nightly-${GITHUB_SHA::7}

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" KytyPS5.zip --clobber
          else
            gh release create "$TAG" KytyPS5.zip \
              --title "$TAG" \
              --generate-notes
          fi
