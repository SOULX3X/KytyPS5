name: Build KytyPS5

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Visual Studio environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install Vulkan SDK
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://sdk.lunarg.com/sdk/download/1.4.335.0/windows/vulkansdk-windows-X64-1.4.335.0.exe" `
            -OutFile VulkanSDK.exe
          Start-Process .\VulkanSDK.exe `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait

      - name: Locate Vulkan SDK
        shell: powershell
        run: |
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($sdk.FullName)" >> $env:GITHUB_ENV

      - name: Verify toolchain
        shell: cmd
        run: |
          git --version
          cmake --version
          ninja --version
          clang-cl --version
          echo Qt6_DIR=%Qt6_DIR%
          echo VULKAN_SDK=%VULKAN_SDK%

      - name: Configure
        shell: cmd
        run: |
          cmake -S src -B _Build/windows ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%" ^
            -DVULKAN_SDK="%VULKAN_SDK%"

      - name: Build
        shell: cmd
        run: |
          cmake --build _Build/windows --target launcher --parallel

      - name: Install
        shell: cmd
        run: |
          cmake --install _Build/windows --prefix _Build/windows/install

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5
          path: _Build/windows/install/**
