name: Build KytyPS5

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install Vulkan SDK 1.4.335.0
        shell: powershell
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.4.335.0/windows/vulkansdk-windows-X64-1.4.335.0.exe"

          Write-Host "Downloading Vulkan SDK..."
          Invoke-WebRequest $url -OutFile VulkanSDK.exe

          Write-Host "Running installer..."
          $proc = Start-Process `
            -FilePath ".\VulkanSDK.exe" `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -PassThru

          if (-not $proc.WaitForExit(900000)) {
            Write-Error "Vulkan SDK installer timed out after 15 minutes."
            Stop-Process -Id $proc.Id -Force
            exit 1
          }

          Write-Host "Installer exit code: $($proc.ExitCode)"

          if ($proc.ExitCode -ne 0) {
            exit $proc.ExitCode
          }

          if (!(Test-Path "C:\VulkanSDK\1.4.335.0")) {
            Write-Error "Vulkan SDK installation directory not found."
            exit 1
          }

          if (!(Test-Path "C:\VulkanSDK\1.4.335.0\Bin\glslangValidator.exe")) {
            Write-Error "glslangValidator.exe not found."
            Get-ChildItem C:\VulkanSDK -Recurse
            exit 1
          }

          "VULKAN_SDK=C:\VulkanSDK\1.4.335.0" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\VulkanSDK\1.4.335.0\Bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Toolchain
        shell: cmd
        run: |
          git --version
          cmake --version
          ninja --version
          clang-cl --version
          echo.
          echo Qt6_DIR=%Qt6_DIR%
          echo VULKAN_SDK=%VULKAN_SDK%
          where glslangValidator
          glslangValidator --version

      - name: Configure
        shell: cmd
        run: |
          cmake -S src -B _Build/windows ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%"

      - name: Build
        shell: cmd
        run: |
          cmake --build _Build/windows --config Release --parallel --target launcher

      - name: Install
        shell: cmd
        run: |
          cmake --install _Build/windows --prefix _Build/windows/install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KytyPS5
          path: _Build/windows/install/**
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: KytyPS5
          path: KytyPS5

      - name: Create ZIP
        run: |
          zip -r KytyPS5.zip KytyPS5

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=KytyPS5-$(date -u +'%Y-%m-%d')-${GITHUB_SHA::7}

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" KytyPS5.zip \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" KytyPS5.zip \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi
